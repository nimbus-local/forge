# Nimbus + DynamoDB Local for local smoke testing.
# Mirrors the containers started by .github/workflows/smoke.yml.
#
# Pin NIMBUS_VERSION here AND in smoke.yml when upgrading Nimbus.
#
# Usage:
#   make smoke       (starts automatically via smoke-up prerequisite)
#   make smoke-up    (start only)
#   make smoke-down  (stop and remove)

services:
  nimbus:
    image: ghcr.io/nimbus-local/nimbus:0.4.17
    container_name: forge-smoke-nimbus
    ports:
      - "4567:4566"
    environment:
      AWS_DEFAULT_REGION: us-east-1
      NIMBUS_DYNAMODB_ENDPOINT: http://forge-smoke-dynamodb:8000
    depends_on:
      dynamodb-local:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_nimbus/health"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks:
      - forge-smoke-net

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: forge-smoke-dynamodb
    command: "-jar DynamoDBLocal.jar -inMemory -sharedDb"
    healthcheck:
      # DynamoDB Local returns 400 for GET / — check status starts with 2 or 4
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000 | grep -qE '^[24]'"]
      interval: 2s
      timeout: 3s
      retries: 10
    networks:
      - forge-smoke-net

networks:
  forge-smoke-net:
    name: forge-smoke-net
    driver: bridge
