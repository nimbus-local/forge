name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -short

      - name: Build binaries
        run: |
          GOOS=linux  GOARCH=amd64 go build -o forge-linux-amd64  ./cmd/forge
          GOOS=linux  GOARCH=arm64 go build -o forge-linux-arm64  ./cmd/forge
          GOOS=darwin GOARCH=amd64 go build -o forge-darwin-amd64 ./cmd/forge
          GOOS=darwin GOARCH=arm64 go build -o forge-darwin-arm64 ./cmd/forge

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            forge-linux-amd64 \
            forge-linux-arm64 \
            forge-darwin-amd64 \
            forge-darwin-arm64
