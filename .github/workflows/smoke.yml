name: Smoke Tests

on:
  pull_request:

# All AWS calls go to Nimbus at localhost:4566.
# AWS_ENDPOINT_URL is the standard SDK v2 override — covers the STS call inside
# forge.Run() (resolveAccountID) which runs before the Pulumi workspace env is set.
# FORGE_AWS_ENDPOINT is forge's own override — sets AWS_ENDPOINT_URL + path-style
# S3 in the Pulumi workspace for the provider plugin.
env:
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL: http://localhost:4566
  FORGE_AWS_ENDPOINT: http://localhost:4566
  PULUMI_CONFIG_PASSPHRASE: ""

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  # Compile once; both smoke jobs download the same artifacts.

  build:
    name: Build forge + smoke handler
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            examples/smoke/go.sum
            examples/smoke/infra/go.sum

      # Verify the stub compiles for linux/amd64 (used by `forge dev`).
      - name: Verify forge-stub compiles
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/forge-stub/

      - name: Build forge CLI
        run: go build -o forge ./cmd/forge

      # Cross-compile for ARM64 Linux (Lambda runtime) and zip.
      - name: Build smoke Lambda handler
        working-directory: examples/smoke
        run: |
          GOARCH=arm64 GOOS=linux CGO_ENABLED=0 \
            go build -o bootstrap ./functions/handler
          zip -j functions/handler.zip bootstrap
          rm bootstrap

      - name: Upload forge binary
        uses: actions/upload-artifact@v7
        with:
          name: forge-binary
          path: forge

      - name: Upload smoke handler
        uses: actions/upload-artifact@v7
        with:
          name: smoke-handler
          path: examples/smoke/functions/handler.zip

  # ── Smoke: full deploy ────────────────────────────────────────────────────────
  # Exercises every construct via deploy → assert → remove.

  smoke:
    name: Smoke — deploy against Nimbus
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            examples/smoke/go.sum
            examples/smoke/infra/go.sum

      - name: Download forge binary
        uses: actions/download-artifact@v8
        with:
          name: forge-binary

      - name: Download smoke handler
        uses: actions/download-artifact@v8
        with:
          name: smoke-handler
          path: examples/smoke/functions

      - name: Make forge executable
        run: chmod +x forge

      # Sync the example infra module to whatever forge's go.mod now pins. The
      # infra module `replace`s forge => local, so a Dependabot bump to a shared
      # dependency (pulumi-aws, pulumi/sdk, …) in the root go.mod leaves
      # examples/smoke/infra/go.sum stale until tidied — otherwise `forge deploy`
      # fails the build with a missing go.sum entry.
      - name: Sync smoke infra module
        working-directory: examples/smoke/infra
        run: go mod tidy

      # Cache the Pulumi AWS provider plugin so the ~100 MB download only happens
      # when the SDK version (and thus the plugin forge installs) changes. The
      # key is derived from go.mod so it tracks bumps automatically.
      - name: Resolve AWS plugin version
        id: awsver
        run: echo "v=$(go list -m -f '{{.Version}}' github.com/pulumi/pulumi-aws/sdk/v7)" >> "$GITHUB_OUTPUT"

      - name: Cache Pulumi plugins
        uses: actions/cache@v6
        with:
          path: ~/.pulumi/plugins
          key: pulumi-plugins-aws-${{ steps.awsver.outputs.v }}

      # ── Nimbus ──────────────────────────────────────────────────────────────
      # Nimbus proxies DynamoDB requests to the official amazon/dynamodb-local
      # image on a shared Docker network.

      - name: Start Nimbus
        run: |
          docker network create nimbus-net

          docker run -d \
            --name dynamodb-local \
            --network nimbus-net \
            amazon/dynamodb-local:latest \
            -jar DynamoDBLocal.jar -inMemory -sharedDb

          docker run -d \
            --name nimbus \
            --network nimbus-net \
            -p 4566:4566 \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -e NIMBUS_DYNAMODB_ENDPOINT=http://dynamodb-local:8000 \
            ghcr.io/nimbus-local/nimbus:0.4.20

          echo -n "Waiting for Nimbus..."
          until curl -sf http://localhost:4566/_nimbus/health >/dev/null; do
            echo -n "."
            sleep 1
          done
          echo " ready"

      # ── Seed ────────────────────────────────────────────────────────────────
      # NewSecret panics at deploy time if the SSM parameter is missing and no
      # Default is set. Pre-seed it so deploy succeeds without modifying the example.

      - name: Seed AppSecret in SSM
        run: |
          aws ssm put-parameter \
            --name /forge/forge-smoke/ci/AppSecret \
            --value "smoke-default" \
            --type SecureString \
            --overwrite

      # ── Deploy ──────────────────────────────────────────────────────────────

      - name: Deploy smoke stack
        id: deploy
        working-directory: examples/smoke
        run: ../../forge deploy --stage ci

      # ── Assert ──────────────────────────────────────────────────────────────

      - name: Assert every construct created its resources
        if: steps.deploy.outcome == 'success'
        run: .github/scripts/smoke-assert.sh

      # ── Cleanup ─────────────────────────────────────────────────────────────

      - name: Remove smoke stack
        if: always()
        working-directory: examples/smoke
        # Partial deploy (or assert failure after successful deploy) can leave
        # resources behind; continue-on-error prevents a cleanup failure from
        # masking the real failure above.
        continue-on-error: true
        run: ../../forge remove --stage ci

      - name: Stop Nimbus
        if: always()
        run: |
          docker rm -f nimbus dynamodb-local 2>/dev/null || true
          docker network rm nimbus-net 2>/dev/null || true

  # ── Smoke: dev tunnel ─────────────────────────────────────────────────────────
  # Verifies forge dev deploys stub Lambdas and creates dev SQS queues.

  smoke-dev:
    name: Smoke — forge dev tunnel
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            examples/smoke/go.sum
            examples/smoke/infra/go.sum

      - name: Download forge binary
        uses: actions/download-artifact@v8
        with:
          name: forge-binary

      - name: Download smoke handler
        uses: actions/download-artifact@v8
        with:
          name: smoke-handler
          path: examples/smoke/functions

      - name: Make forge executable
        run: chmod +x forge

      # See the smoke job for why this tidy is required (replace => local forge).
      - name: Sync smoke infra module
        working-directory: examples/smoke/infra
        run: go mod tidy

      - name: Resolve AWS plugin version
        id: awsver
        run: echo "v=$(go list -m -f '{{.Version}}' github.com/pulumi/pulumi-aws/sdk/v7)" >> "$GITHUB_OUTPUT"

      - name: Cache Pulumi plugins
        uses: actions/cache@v6
        with:
          path: ~/.pulumi/plugins
          key: pulumi-plugins-aws-${{ steps.awsver.outputs.v }}

      # ── Nimbus ──────────────────────────────────────────────────────────────

      - name: Start Nimbus
        run: |
          docker network create nimbus-net

          docker run -d \
            --name dynamodb-local \
            --network nimbus-net \
            amazon/dynamodb-local:latest \
            -jar DynamoDBLocal.jar -inMemory -sharedDb

          docker run -d \
            --name nimbus \
            --network nimbus-net \
            -p 4566:4566 \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -e NIMBUS_DYNAMODB_ENDPOINT=http://dynamodb-local:8000 \
            ghcr.io/nimbus-local/nimbus:0.4.20

          echo -n "Waiting for Nimbus..."
          until curl -sf http://localhost:4566/_nimbus/health >/dev/null; do
            echo -n "."
            sleep 1
          done
          echo " ready"

      # ── Seed ────────────────────────────────────────────────────────────────

      - name: Seed AppSecret for dev stage
        run: |
          aws ssm put-parameter \
            --name /forge/forge-smoke/ci-dev/AppSecret \
            --value "smoke-default" \
            --type SecureString \
            --overwrite

      # ── Dev tunnel ──────────────────────────────────────────────────────────
      # Run `forge dev` against a separate stage (ci-dev) to verify:
      #   - forge-stub is cross-compiled and deployed correctly
      #   - shared SQS dev queues are created
      #   - stub Lambda env vars contain FORGE_REQUEST_QUEUE_URL
      # The tunnel sits idle (Nimbus doesn't invoke Lambda), so we kill it
      # after the deployment completes.

      - name: Run forge dev (background deploy)
        working-directory: examples/smoke
        run: |
          ../../forge dev --stage ci-dev 2>&1 | tee /tmp/forge-dev.log &
          echo $! > /tmp/forge-dev.pid
          # Wait up to 3 minutes for "Tunnel active" indicating deploy finished.
          for i in $(seq 90); do
            if grep -q "Tunnel active" /tmp/forge-dev.log 2>/dev/null; then
              echo "Dev tunnel is active."
              break
            fi
            sleep 2
          done

      - name: Assert dev queues and stub env vars
        if: always()
        run: .github/scripts/smoke-assert-dev.sh

      - name: Stop forge dev
        if: always()
        run: kill "$(cat /tmp/forge-dev.pid 2>/dev/null)" 2>/dev/null || true
        continue-on-error: true

      - name: Remove dev smoke stack
        if: always()
        working-directory: examples/smoke
        continue-on-error: true
        run: ../../forge remove --stage ci-dev

      - name: Stop Nimbus
        if: always()
        run: |
          docker rm -f nimbus dynamodb-local 2>/dev/null || true
          docker network rm nimbus-net 2>/dev/null || true
